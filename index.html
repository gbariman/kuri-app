<p class="sub">Opišite tematsko dejavnost — orodje ustvari načrt po Kurikulumu za vrtce (2025).</p>

<div class="card">

<script>
var SYS = `Si strokovni pomočnik za načrtovanje vzgojnega dela v slovenskem vrtcu. Dela IZKLJUČNO po Kurikulumu za vrtce (2025), ki ga je Strokovni svet RS za splošno izobraževanje sprejel 20. 2. 2025.

TEMELJNI IZHODIŠČI:
- Otrok je kompetenten posameznik; spodbujaj participacijo, iniciativnost, radovednost in simbolno igro
- 1. starostno obdobje (1–3 leta): kratke, čutno-gibalne dejavnosti, rutina, varna čustvena navezanost
- 2. starostno obdobje (3–6 let): bolj strukturirane dejavnosti, simbolna igra, jezik, mišljenje, socialne veščine

- Prečne zmožnosti, ki se prepletajo skozi vsa področja: socialne spretnosti, čustveno doživljanje, sporazumevalna zmožnost, metaspoznavne zmožnosti, domišljija in ustvarjalnost, moralno presojanje, medijska pismenost

URADNI CILJI PO PODROČJIH DEJAVNOSTI (Kurikulum za vrtce, 2025):

11. prostorske predstave in zaznavanje iz različnih perspektiv

7. izvajanje in poimenovanje gibanj; primerjanje po sledeh, trajanju, hitrosti
8. pojavi v naravi: zvok, svetloba, vremenski pojavi, pojavi na nebu
9. doživljanje časa; trajanje in zaporedje dogodkov
10. starosti primerna predstava o planetu Zemlja in vesolju
11. spoznavanje lastnega telesa in telesnih razlik med ljudmi
12. življenjski cikel in spremembe v življenju (otrok, odrasli, staranje, smrt)
13. zdrav in varen način življenja; navade; škodljiva ravnanja za zdravje
14. varovanje naravnega okolja, virov in ravnovesja v naravi
15. okoljska vedenja; vpliv ljudi na naravo; trajnostna ravnanja (odpadki, voda, energija)
16. naravoslovno besedišče; naravoslovni postopki (opazovanje, primerjanje, razvrščanje, merjenje, sklepanje); učenje z raziskovanjem
17. namen, zgradba in delovanje tehničnih pripomočkov; tehniška ustvarjalnost
18. varnostni ukrepi pri tehniških dejavnostih

PODROČJE UMETNOST – vzgojiteljica omogoča:
Splošni cilji:
1. stik s kakovostnimi umetniškimi vsebinami (glasbena, likovna, plesna, gledališka, filmska, intermedijska umetnost, fotografija)
2. doživljanje umetnosti; ustvarjalni proces zamišljanja, preizkušanja, izvajanja in vrednotenja
3. čas in fleksibilnost za podoživljanje umetniških izkušenj v spontani igri
4. razvoj čustvenega in spoznavnega sveta prek umetnosti; empatija
5. stik z kulturno dediščino; spoštovanje lastne in drugih kultur
6. aktivna vloga pri načrtovanju umetniških vsebin; participacija
7. sodelovanje s starši, umetniki, kulturnimi ustanovami (knjižnice, gledališča, galerije)
Likovna umetnost: sproščeno ustvarjanje; likovni pojmi (točka, črta, ploskev, barva, prostor, simetrija, ritmično zaporedje); različne tehnike in podlage (suhe/mokre risarske/slikarske tehnike, grafika, kiparstvo, prostorsko oblikovanje)
Glasbena umetnost: doživljanje in vrednotenje glasbe; petje (dur, mol, pentatonika), igranje na glasbila (Orff, telesna, ljudska), ustvarjanje; glasbenodidaktične igre; utrjevanje glasbenega spomina
Plesna umetnost: gibalno izražanje ob notranjih in zunanjih spodbudah; plesni elementi (telo, prostor, čas, energija); ustvarjalni ples; bibarije, gibalno-rajalne igre, ljudski plesi
Gledališka umetnost: ogled gledaliških predstav; igra vlog, lutke, maska, pantomima; skupno ustvarjanje zgodbe, scenarija, scenografije
Filmska umetnost in fotografija: ogled kakovostnih filmov; igra z elementi filma (lik, zgodba, zvok, svetloba); ustvarjanje fotografij, animacij, fotozgodb
Intermedijska umetnost: prepletanje umetniških zvrsti; smiselna in premišljena raba digitalne tehnologije

ISKANJE PO SPLETU:
Če vzgojiteljica v opisu omeni knjigo, slikanico, pesem ali drugo literarno delo (npr. naslov in/ali avtor), ki ga ne poznaš ali nisi prepričan/-a o vsebini, OBVEZNO poišči informacije o njem s spletnim iskanjem, preden začneš ustvarjati načrt. Dejavnosti morajo izhajati iz dejanske vsebine dela (liki, zgodba, teme) — ne smeš si vsebine izmisliti.

Ko dobiš opis tematskega sklopa, ustvari strukturiran dokument IZKLJUČNO V SLOVENŠČINI z naslednjimi razdelki:

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function mdToHtml(md) {
  var lines = md.split("\n"), html = "", ul = false;
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (!l || l === "---") { if (ul) { html += "</ul>"; ul = false; } continue; }
    var s = escHtml(l).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    if (l.indexOf("# ") === 0 && l.indexOf("## ") !== 0) {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<h1>" + s.replace(/^# /, "") + "</h1>";
    } else if (l.indexOf("## ") === 0) {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<h2>" + s.replace(/^## /, "") + "</h2>";
    } else if (l.indexOf("### ") === 0) {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<h3>" + s.replace(/^### /, "") + "</h3>";
    } else if (l.match(/^[-*] /)) {
      if (!ul) { html += "<ul>"; ul = true; }
      html += "<li>" + s.slice(2) + "</li>";
    } else if (l.match(/^\d+\. /)) {
      if (!ul) { html += "<ul>"; ul = true; }
      html += "<li>" + s.replace(/^\d+\. /, "") + "</li>";
    } else {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<p>" + s + "</p>";
    }
  }
  if (ul) html += "</ul>";
  return html;
}

document.getElementById("btnGenerate").onclick = function() {
  var act = document.getElementById("act").value.trim();
  var ttl = document.getElementById("ttl").value.trim();
  var dur = document.getElementById("dur").value.trim();
  var ageFrom = document.getElementById("ageFrom").value.trim();
  var ageTo = document.getElementById("ageTo").value.trim();
  var errEl = document.getElementById("err");

  if (act.length < 20) {
    errEl.innerHTML = "<div class='err'>Prosim, opišite dejavnost bolj podrobno.</div>";
    return;
  }
  errEl.innerHTML = "";

  var userMsg = "Ustvari nacrt tematskega sklopa.\n";

  if (dur) userMsg += "Trajanje: " + dur + "\n";
  if (ageFrom && ageTo) userMsg += "Starost otrok: " + ageFrom + "–" + ageTo + " let\n";
  else if (ageFrom) userMsg += "Starost otrok: od " + ageFrom + " let\n";
  else if (ageTo) userMsg += "Starost otrok: do " + ageTo + " let\n";
  userMsg += "\nOpis dejavnosti:\n" + act;
  userMsg += "\n\nPrilagodi zahtevnost ciljev in dejavnosti starosti otrok. Za mlajše (1–3 leta): krajše, čutno-gibalne dejavnosti. Za starejše (4–6 let): bolj strukturirane, jezikovne in miselne dejavnosti.";

  document.getElementById("btnGenerate").disabled = true;
  document.getElementById("loader").style.display = "flex";
  document.getElementById("out").style.display = "none";

  fetch("/.netlify/functions/generate", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ system: SYS, messages: [{ role: "user", content: userMsg }] })
  })
  .then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(r.status + " – " + t); });

    var fullText = "";
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var buffer = "";
    var docEl = document.getElementById("doc");
    var outEl = document.getElementById("out");
    var loaderEl = document.getElementById("loader");

    loaderEl.style.display = "none";
    outEl.style.display = "block";

    function pump(done, value) {
      if (done) {
        document.getElementById("btnGenerate").disabled = false;
        return;
      }
      buffer += decoder.decode(value, { stream: true });
      var lines = buffer.split("\n");
      buffer = lines.pop();
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (!line.startsWith("data: ")) continue;
        var raw = line.slice(6);
        if (raw === "[DONE]") continue;
        try {
          var evt = JSON.parse(raw);
          if (evt.type === "content_block_delta" && evt.delta && evt.delta.type === "text_delta") {
            fullText += evt.delta.text;
            docEl.innerHTML = mdToHtml(fullText);
          }
        } catch(e) {}
      }
      return reader.read().then(function(res) { return pump(res.done, res.value); });
    }

    return reader.read().then(function(res) { return pump(res.done, res.value); });
  })
  .catch(function(e) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("btnGenerate").disabled = false;
    errEl.innerHTML = "<div class='err'>Napaka: " + escHtml(e.message) + "</div>";
  });
};
