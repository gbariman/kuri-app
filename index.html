<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Načrtovalnik kurikuluma za vrtce</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; font-size: 15px; line-height: 1.7; color: #222; background: #f9f9f7; padding: 2rem 1rem; }
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.sub { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
textarea { width: 100%; min-height: 130px; padding: 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; resize: vertical; font-family: sans-serif; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
input[type=text], input[type=number] { width: 100%; padding: 8px 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; font-family: sans-serif; }
.btn-row { margin-top: 12px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
#btnGenerate { background: #222; color: #fff; border: none; border-radius: 6px; padding: 9px 22px; font-size: 14px; cursor: pointer; }
#btnGenerate:hover { background: #444; }
#btnGenerate:disabled { background: #aaa; cursor: not-allowed; }
#btnClear { background: transparent; border: 1px solid #ddd; border-radius: 6px; padding: 9px 16px; font-size: 13px; cursor: pointer; color: #555; }
.loader { display: none; align-items: center; gap: 8px; font-size: 13px; color: #888; padding: 1rem 0; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: p 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes p { 0%,100%{opacity:0.2} 50%{opacity:1} }
.output { display: none; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.5rem; margin-top: 1rem; }
.out-actions { display: flex; gap: 8px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
.out-actions button { background: transparent; border: 1px solid #ddd; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; color: #555; }
.doc h1 { font-size: 18px; margin-bottom: 6px; }
.doc h2 { font-size: 15px; font-weight: 600; margin: 1.5rem 0 6px; padding-top: 1rem; border-top: 1px solid #eee; }
.doc h3 { font-size: 13px; font-weight: 600; color: #555; margin: 1rem 0 4px; text-transform: uppercase; letter-spacing: .04em; }
.doc ul { margin: 4px 0 10px 1.2rem; }
.doc li { margin-bottom: 4px; font-size: 14px; }
.doc p { font-size: 14px; margin-bottom: 8px; }
.err { font-size: 13px; color: #c00; background: #fff0f0; border-radius: 6px; padding: 10px; margin-top: 10px; }
@media (max-width: 500px) { .row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">

<h1>Načrtovalnik kurikuluma za vrtce</h1>
<p class="sub">Opišite tematsko dejavnost — orodje ustvari načrt po Kurikulumu za vrtce (2025).</p>

<div class="card">
  <label for="act">Opišite svojo dejavnost</label>
  <textarea id="act" placeholder="Npr.: Tematski sklop »Pod medvedovim dežnikom« za otroke 3–4 let. Zgodba o medvedu in prijateljih. Želim vključiti dejavnosti iz vseh področij: risanje, gibanje, štetje kapljic, pogovor o jeseni…"></textarea>
  <div class="row">
    <div>
      <label for="ttl">Naslov tematskega sklopa</label>
      <input type="text" id="ttl" placeholder="Npr. Pod medvedovim dežnikom" />
    </div>
    <div>
      <label for="dur">Trajanje / obdobje</label>
      <input type="text" id="dur" placeholder="Npr. 1. 10. – 31. 10. 2025" />
    </div>
  </div>
  <div class="row" style="margin-top:12px">
    <div>
      <label for="ageFrom">Starost otrok – od (let)</label>
      <input type="number" id="ageFrom" min="1" max="6" placeholder="Npr. 3" />
    </div>
    <div>
      <label for="ageTo">Starost otrok – do (let)</label>
      <input type="number" id="ageTo" min="1" max="6" placeholder="Npr. 5" />
    </div>
  </div>
  <div class="btn-row">
    <button id="btnGenerate">Ustvari načrt ↗</button>
    <button id="btnClear">Počisti</button>
    <span id="stat" style="font-size:13px;color:#888;"></span>
  </div>
  <div id="err"></div>
</div>

<div class="loader" id="loader">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <span>Pripravljam načrt…</span>
</div>

<div class="output" id="out">
  <div class="out-actions">
    <button id="btnCopy">Kopiraj</button>
    <button id="btnPrint">Natisni</button>
  </div>
  <div class="doc" id="doc"></div>
</div>

</div>
<script>
var SYS = "Si strokovni pomočnik za načrtovanje vzgojnega dela v slovenskem vrtcu po Kurikulumu za vrtce (2025). Ko dobis opis dejavnosti, ustvari strukturiran dokument v slovenscini z razdelki:\n# NASLOV\n**TRAJANJE:** ...\n## CILJI PO PODROČJIH\n### 👪 Družba\n- cilj 1\n- cilj 2\n### 🧸 Gibanje\n- cilj 1\n- cilj 2\n### 📖 Jezik\n- cilj 1\n- cilj 2\n### 🔢 Matematika\n- cilj 1\n- cilj 2\n### 🐻 Narava\n- cilj 1\n- cilj 2\n### 🎨 Umetnost\n- cilj 1\n- cilj 2\n## PREDVIDENE DEJAVNOSTI PO PODROČJIH\n(za vsako področje 3-5 dejavnosti, prilagojenih starosti otrok)\n## POSEBNI DOGODKI\n## EVALVACIJA\nPisi izkljucno v slovenscini. Dejavnosti prilagodi razvojnim znacilnostim otrok glede na podano starost.";

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function mdToHtml(md) {
  var lines = md.split("\n"), html = "", ul = false;
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (!l || l === "---") { if (ul) { html += "</ul>"; ul = false; } continue; }
    var s = escHtml(l).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    if (l.indexOf("# ") === 0 && l.indexOf("## ") !== 0) {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<h1>" + s.replace(/^# /, "") + "</h1>";
    } else if (l.indexOf("## ") === 0) {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<h2>" + s.replace(/^## /, "") + "</h2>";
    } else if (l.indexOf("### ") === 0) {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<h3>" + s.replace(/^### /, "") + "</h3>";
    } else if (l.match(/^[-*] /)) {
      if (!ul) { html += "<ul>"; ul = true; }
      html += "<li>" + s.slice(2) + "</li>";
    } else if (l.match(/^\d+\. /)) {
      if (!ul) { html += "<ul>"; ul = true; }
      html += "<li>" + s.replace(/^\d+\. /, "") + "</li>";
    } else {
      if (ul) { html += "</ul>"; ul = false; }
      html += "<p>" + s + "</p>";
    }
  }
  if (ul) html += "</ul>";
  return html;
}

document.getElementById("btnGenerate").onclick = function() {
  var act = document.getElementById("act").value.trim();
  var ttl = document.getElementById("ttl").value.trim();
  var dur = document.getElementById("dur").value.trim();
  var ageFrom = document.getElementById("ageFrom").value.trim();
  var ageTo = document.getElementById("ageTo").value.trim();
  var errEl = document.getElementById("err");

  if (act.length < 20) {
    errEl.innerHTML = "<div class='err'>Prosim, opišite dejavnost bolj podrobno.</div>";
    return;
  }
  errEl.innerHTML = "";

  var userMsg = "Ustvari nacrt tematskega sklopa.\n";
  if (ttl) userMsg += "Naslov: " + ttl + "\n";
  if (dur) userMsg += "Trajanje: " + dur + "\n";
  if (ageFrom && ageTo) userMsg += "Starost otrok: " + ageFrom + "–" + ageTo + " let\n";
  else if (ageFrom) userMsg += "Starost otrok: od " + ageFrom + " let\n";
  else if (ageTo) userMsg += "Starost otrok: do " + ageTo + " let\n";
  userMsg += "\nOpis dejavnosti:\n" + act;
  userMsg += "\n\nPrilagodi zahtevnost ciljev in dejavnosti starosti otrok. Za mlajše (1–3 leta): krajše, čutno-gibalne dejavnosti. Za starejše (4–6 let): bolj strukturirane, jezikovne in miselne dejavnosti.";

  document.getElementById("btnGenerate").disabled = true;
  document.getElementById("loader").style.display = "flex";
  document.getElementById("out").style.display = "none";

  fetch("/.netlify/functions/generate", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ system: SYS, messages: [{ role: "user", content: userMsg }] })
  })
  .then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(r.status + " – " + t); });
    return r.json();
  })
  .then(function(d) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("btnGenerate").disabled = false;
    if (d.error) {
      errEl.innerHTML = "<div class='err'>Napaka: " + escHtml(d.error) + "</div>";
      return;
    }
    var txt = d.content && d.content[0] ? d.content[0].text : "";
    if (!txt) {
      errEl.innerHTML = "<div class='err'>Ni odgovora. Prosim, poskusite znova.</div>";
      return;
    }
    document.getElementById("doc").innerHTML = mdToHtml(txt);
    document.getElementById("out").style.display = "block";
  })
  .catch(function(e) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("btnGenerate").disabled = false;
    errEl.innerHTML = "<div class='err'>Napaka: " + e.message + "</div>";
  });
};

document.getElementById("btnClear").onclick = function() {
  document.getElementById("act").value = "";
  document.getElementById("ttl").value = "";
  document.getElementById("dur").value = "";
  document.getElementById("ageFrom").value = "";
  document.getElementById("ageTo").value = "";
  document.getElementById("out").style.display = "none";
  document.getElementById("err").innerHTML = "";
  document.getElementById("stat").textContent = "";
};

document.getElementById("btnCopy").onclick = function() {
  navigator.clipboard.writeText(document.getElementById("doc").innerText).then(function() {
    document.getElementById("stat").textContent = "Kopirano!";
    setTimeout(function() { document.getElementById("stat").textContent = ""; }, 2000);
  });
};

document.getElementById("btnPrint").onclick = function() {
  var w = window.open("", "_blank");
  w.document.write("<!DOCTYPE html><html><head><meta charset='utf-8'><style>body{font-family:Georgia,serif;max-width:720px;margin:2rem auto;font-size:14px;line-height:1.8;color:#222}h1{font-size:20px}h2{font-size:16px;margin-top:1.5rem;border-top:1px solid #ddd;padding-top:.5rem}h3{font-size:13px;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-top:1rem}ul{margin-left:1.4rem}li{margin-bottom:3px}</style></head><body>" + document.getElementById("doc").innerHTML + "</body></html>");
  w.document.close();
  w.print();
};
</script>
</body>
</html>
